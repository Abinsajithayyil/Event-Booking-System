<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EventBook</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .password-group {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 38px;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 1.2rem;
            color: #667eea;
        }

        .password-toggle:hover {
            color: #764ba2;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h1 {
            color: #667eea;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: #666;
        }

        .demo-credentials {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid #ddd;
            text-align: center;
            font-size: 0.9rem;
        }

        .demo-credentials p {
            margin: 0.5rem 0;
            color: #666;
        }

        .demo-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 1rem;
        }

        .demo-box {
            background: #f0f4ff;
            border-left: 3px solid #667eea;
            padding: 0.7rem;
            border-radius: 4px;
            margin: 0.5rem 0;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">🎟️ EventBook</div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="register.html" class="btn-nav">Register</a></li>
            </ul>
        </div>
    </nav>

    <!-- Login Form -->
    <div class="form-container">
        <div class="login-header">
            <h1>Welcome Back!</h1>
            <p>Sign in to your EventBook account</p>
        </div>
        <div id="message"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email">📧 Email</label>
                <input type="email" id="email" name="email" placeholder="your@email.com" required>
            </div>

            <div class="form-group password-group">
                <label for="password">🔐 Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
                <button type="button" class="password-toggle" onclick="togglePassword()">👁️</button>
            </div>

            <button type="submit" class="btn form-btn">Login</button>
        </form>

        <div class="form-link">
            Don't have an account? <a href="register.html">Register here</a>
        </div>

        <!-- Admin Demo Credentials -->
        <div class="demo-credentials">
            <p class="demo-title">📋 Demo Admin Account</p>
            <div class="demo-box">
                Email: <strong>admin@eventbook.com</strong>
            </div>
            <div class="demo-box">
                Password: <strong>admin123</strong>
            </div>
            <p style="font-size: 0.85rem; color: #999; margin-top: 1rem;">
                👆 Use these credentials to access the admin dashboard
            </p>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 EventBook. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/script.js"></script>
    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
            } else {
                passwordInput.type = 'password';
            }
        }
    </script>
</body>
</html>
